<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="100%" role="img" aria-labelledby="flowTitle flowDesc">
  <title id="flowTitle">核心交互流 - 注册到管理宠物的完整路径</title>
  <desc id="flowDesc">用户从注册账户、登录签发 JWT、浏览搜索宠物、鉴权后管理宠物到统一响应返回的完整交互路径。</desc>

  <defs>
    <marker id="flowArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 1 1 L 8 5 L 1 9" fill="none" stroke="#8B7E72" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="320" rx="20" fill="#1A1410"/>
  <rect x="0.5" y="0.5" width="1199" height="319" rx="20" fill="none" stroke="#2A211B" stroke-width="1"/>

  <g transform="translate(48 36)">
    <line x1="0" y1="6" x2="22" y2="6" stroke="#C97B5C" stroke-width="2" stroke-linecap="round"/>
    <text x="32" y="11" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" font-weight="500" letter-spacing="1.6" fill="#C97B5C">USER FLOW · CORE</text>
    <text x="0" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="32" font-weight="700" letter-spacing="-0.3" fill="#E8E4D9">核心交互流</text>
    <text x="0" y="74" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="400" fill="#8B7E72">用户从注册到管理宠物的完整路径,鉴权操作统一走 Bearer token</text>
  </g>

  <g transform="translate(48 140)">
    <g>
      <rect x="0" y="0" width="196" height="96" rx="12" fill="#221C18" stroke="#3A2F26" stroke-width="1"/>
      <rect x="0" y="0" width="196" height="4" rx="2" fill="#C97B5C"/>
      <text x="98" y="32" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" font-weight="500" letter-spacing="1.2" fill="#C97B5C">注册</text>
      <text x="98" y="58" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="600" fill="#E8E4D9">POST /user/register</text>
      <text x="98" y="80" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" font-weight="400" fill="#8B7E72">bcrypt 加密入库</text>
    </g>
    <line x1="196" y1="48" x2="226" y2="48" stroke="#8B7E72" stroke-width="1.2" marker-end="url(#flowArrow)"/>

    <g transform="translate(226 0)">
      <rect x="0" y="0" width="196" height="96" rx="12" fill="#16202E" stroke="#283248" stroke-width="1"/>
      <rect x="0" y="0" width="196" height="4" rx="2" fill="#4A9EFF"/>
      <text x="98" y="32" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" font-weight="500" letter-spacing="1.2" fill="#4A9EFF">登录</text>
      <text x="98" y="58" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="600" fill="#E8E4D9">POST /user/login</text>
      <text x="98" y="80" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" font-weight="400" fill="#8B7E72">签发 JWT · 24h</text>
    </g>
    <line x1="422" y1="48" x2="452" y2="48" stroke="#8B7E72" stroke-width="1.2" marker-end="url(#flowArrow)"/>

    <g transform="translate(452 0)">
      <rect x="0" y="0" width="196" height="96" rx="12" fill="#14201A" stroke="#2A3A30" stroke-width="1"/>
      <rect x="0" y="0" width="196" height="4" rx="2" fill="#9EB8A8"/>
      <text x="98" y="32" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" font-weight="500" letter-spacing="1.2" fill="#9EB8A8">浏览</text>
      <text x="98" y="58" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="600" fill="#E8E4D9">GET /pet/list · search</text>
      <text x="98" y="80" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" font-weight="400" fill="#8B7E72">无需鉴权</text>
    </g>
    <line x1="648" y1="48" x2="678" y2="48" stroke="#8B7E72" stroke-width="1.2" marker-end="url(#flowArrow)"/>

    <g transform="translate(678 0)">
      <rect x="0" y="0" width="196" height="96" rx="12" fill="#221C18" stroke="#3A2F26" stroke-width="1"/>
      <rect x="0" y="0" width="196" height="4" rx="2" fill="#C97B5C"/>
      <text x="98" y="32" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" font-weight="500" letter-spacing="1.2" fill="#C97B5C">管理</text>
      <text x="98" y="58" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="600" fill="#E8E4D9">POST /pet/add · DELETE</text>
      <text x="98" y="80" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" font-weight="400" fill="#8B7E72">需 Bearer token</text>
    </g>
    <line x1="874" y1="48" x2="904" y2="48" stroke="#8B7E72" stroke-width="1.2" marker-end="url(#flowArrow)"/>

    <g transform="translate(904 0)">
      <rect x="0" y="0" width="196" height="96" rx="12" fill="#221C18" stroke="#3A2F26" stroke-width="1"/>
      <rect x="0" y="0" width="196" height="4" rx="2" fill="#E8E4D9"/>
      <text x="98" y="32" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" font-weight="500" letter-spacing="1.2" fill="#E8E4D9">响应</text>
      <text x="98" y="58" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="600" fill="#E8E4D9">{ code, message, data }</text>
      <text x="98" y="80" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" font-weight="400" fill="#8B7E72">三段式统一返回</text>
    </g>
  </g>

  <g transform="translate(48 280)">
    <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" font-weight="400" fill="#8B7E72">受保护接口(新增 / 删除宠物)经中间件 auth.js 校验 JWT 后才进入模型层</text>
  </g>
</svg>
