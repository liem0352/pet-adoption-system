<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" role="img" aria-labelledby="t d">
  <title id="t">pet-adoption-system · 宠物领养管理系统</title>
  <desc id="d">Node.js + Express + MySQL + JWT 宠物领养后端 API,分层架构 + JWT 认证。左侧标题与技术栈,右侧展示分层请求流程与认证链路。</desc>
  <rect width="1200" height="340" rx="22" fill="#0f1a12"/>
  <rect x="0" y="0" width="6" height="340" rx="3" fill="#84cc16"/>

