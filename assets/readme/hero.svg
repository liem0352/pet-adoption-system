    <text x="0" y="96" font-size="17" fill="#8fa890">Node.js + Express + MySQL + JWT</text>
    <text x="0" y="122" font-size="17" fill="#8fa890">分层架构 · 身份认证 · 前端测试页</text>

    <g transform="translate(0,160)" font-size="13.5" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
      <g><rect width="88" height="30" rx="8" fill="none" stroke="#1f3324"/><text x="44" y="20" text-anchor="middle" fill="#bdd0bf">Express 5</text></g>
      <g transform="translate(100,0)"><rect width="76" height="30" rx="8" fill="none" stroke="#1f3324"/><text x="38" y="20" text-anchor="middle" fill="#bdd0bf">mysql2</text></g>
      <g transform="translate(188,0)"><rect width="92" height="30" rx="8" fill="none" stroke="#1f3324"/><text x="46" y="20" text-anchor="middle" fill="#bdd0bf">bcryptjs</text></g>
      <g transform="translate(292,0)"><rect width="56" height="30" rx="8" fill="none" stroke="#1f3324"/><text x="28" y="20" text-anchor="middle" fill="#bdd0bf">JWT</text></g>
      <g transform="translate(360,0)"><rect width="60" height="30" rx="8" fill="none" stroke="#1f3324"/><text x="30" y="20" text-anchor="middle" fill="#bdd0bf">cors</text></g>
      <g transform="translate(432,0)"><rect width="64" height="30" rx="8" fill="none" stroke="#1f3324"/><text x="32" y="20" text-anchor="middle" fill="#bdd0bf">dotenv</text></g>
    </g>
